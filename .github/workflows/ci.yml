name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Contracts, agent and app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Compile contracts
        run: npm run compile -w @vane/contracts

      - name: Typecheck agent
        run: npm run typecheck -w @vane/agent

      - name: Run the decision engine
        run: npm run demo -w @vane/agent

      - name: Build app
        run: npm run build -w app
